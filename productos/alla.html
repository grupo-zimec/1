function generarClaveProducto(nombre, index) {
  const claves = {
    "varilla": "VR",

    "alambrón": "AB",
    "alambre recocido": "AR",

    "malla san ciclónica": "MC",
    "reja san": "RJ",
    "redondo": "RD",
    "cuadrado": "CU"
  };

  let nombreLower = nombre.toLowerCase();
  let base = "PR";

  // Buscar coincidencia parcial
  for (let key in claves) {
    if (nombreLower.includes(key)) {
      base = claves[key];
      break;
    }
  }

  // Devuelve clave con número basado en index
  return base;
}
